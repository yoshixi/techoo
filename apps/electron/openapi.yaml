openapi: 3.0.0
info:
  version: 1.0.0
  title: Shuchu API
  description: API for the Shuchu task management application with OpenAPI documentation
components:
  schemas:
    HealthResponse:
      type: object
      properties:
        status:
          type: string
          description: Health status
          example: ok
        message:
          type: string
          description: Health status message
          example: Shuchu API is running
        timestamp:
          type: string
          format: date-time
          description: Current timestamp
          example: 2024-01-01T10:00:00.000Z
      required:
        - status
        - message
        - timestamp
    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the task
          example: 01234567-89ab-cdef-0123-456789abcdef
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Title of the task
          example: Complete project documentation
        description:
          type: string
          description: Detailed description of the task
          example: Write comprehensive documentation for the API endpoints
        dueDate:
          type: string
          nullable: true
          format: date-time
          description: Due date for the task in ISO 8601 format
          example: 2024-12-31T23:59:59.000Z
        completedAt:
          type: string
          nullable: true
          format: date-time
          description: Completion timestamp in ISO 8601 format
          example: 2024-01-02T08:00:00.000Z
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the task was created
          example: 2024-01-01T10:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the task was last updated
          example: 2024-01-01T15:30:00.000Z
      required:
        - id
        - title
        - description
        - createdAt
        - updatedAt
    TaskListResponse:
      type: object
      properties:
        tasks:
          type: array
          items:
            $ref: "#/components/schemas/Task"
          description: List of tasks
        total:
          type: integer
          minimum: 0
          description: Total number of tasks
          example: 5
      required:
        - tasks
        - total
    ErrorResponse:
      type: object
      properties:
        error:
          type: string
          description: Error message describing what went wrong
          example: Task not found
        code:
          type: string
          description: Optional error code
          example: TASK_NOT_FOUND
      required:
        - error
    TaskResponse:
      type: object
      properties:
        task:
          $ref: "#/components/schemas/Task"
      required:
        - task
    CreateTask:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Title of the task
          example: Complete project documentation
        description:
          type: string
          default: ""
          description: Detailed description of the task
          example: Write comprehensive documentation for the API endpoints
        dueDate:
          type: string
          format: date-time
          description: Due date for the task in ISO 8601 format
          example: 2024-12-31T23:59:59.000Z
        completedAt:
          type: string
          nullable: true
          format: date-time
          description: Completion timestamp. Use null to mark the task as incomplete
          example: 2024-01-02T08:00:00.000Z
      required:
        - title
    UpdateTask:
      type: object
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
          description: Title of the task
          example: Complete project documentation
        description:
          type: string
          description: Detailed description of the task
          example: Write comprehensive documentation for the API endpoints
        dueDate:
          type: string
          nullable: true
          format: date-time
          description: Due date for the task in ISO 8601 format. Use null to remove due date
          example: 2024-12-31T23:59:59.000Z
        completedAt:
          type: string
          nullable: true
          format: date-time
          description: Completion timestamp. Use null to mark the task as incomplete
          example: 2024-01-02T08:00:00.000Z
    TaskTimer:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Unique identifier for the timer
          example: 01234567-89ab-cdef-0123-456789abcdef
        taskId:
          type: string
          format: uuid
          description: ID of the associated task
          example: 01234567-89ab-cdef-0123-456789abcdef
        startTime:
          type: string
          format: date-time
          description: Timestamp when the timer was started
          example: 2024-01-01T10:00:00.000Z
        endTime:
          type: string
          nullable: true
          format: date-time
          description: Timestamp when the timer was ended (null for active timers)
          example: 2024-01-01T10:25:00.000Z
        createdAt:
          type: string
          format: date-time
          description: Timestamp when the timer was created
          example: 2024-01-01T10:00:00.000Z
        updatedAt:
          type: string
          format: date-time
          description: Timestamp when the timer was last updated
          example: 2024-01-01T10:25:00.000Z
      required:
        - id
        - taskId
        - startTime
        - createdAt
        - updatedAt
    TimerListResponse:
      type: object
      properties:
        timers:
          type: array
          items:
            $ref: "#/components/schemas/TaskTimer"
          description: List of timers
        total:
          type: integer
          minimum: 0
          description: Total number of timers
          example: 5
      required:
        - timers
        - total
    TimerResponse:
      type: object
      properties:
        timer:
          $ref: "#/components/schemas/TaskTimer"
      required:
        - timer
    CreateTimer:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
          description: ID of the task to start timer for
          example: 01234567-89ab-cdef-0123-456789abcdef
        startTime:
          type: string
          format: date-time
          description: Timestamp when the timer should start
          example: 2024-01-01T10:00:00.000Z
      required:
        - taskId
        - startTime
    UpdateTimer:
      type: object
      properties:
        endTime:
          type: string
          nullable: true
          format: date-time
          description: Timestamp when the timer ended. Use null to remove end time
          example: 2024-01-01T10:25:00.000Z
  parameters: {}
paths:
  /api/health:
    get:
      summary: Health check
      description: Check if the API is running
      responses:
        "200":
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
  /api/tasks:
    get:
      summary: Get all tasks
      description: Retrieve all tasks
      parameters:
        - schema:
            type: string
            enum:
              - "true"
              - "false"
            description: Filter tasks by completion status
            example: false
          required: false
          description: Filter tasks by completion status
          name: completed
          in: query
      responses:
        "200":
          description: Tasks retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a task
      description: Create a new task
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTask"
      responses:
        "201":
          description: Task created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/tasks/{id}:
    get:
      summary: Get a task
      description: Retrieve a specific task by ID
      parameters:
        - schema:
            type: string
            format: uuid
            description: Task ID
            example: 01234567-89ab-cdef-0123-456789abcdef
          required: true
          description: Task ID
          name: id
          in: path
      responses:
        "200":
          description: Task retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a task
      description: Update an existing task by ID
      parameters:
        - schema:
            type: string
            format: uuid
            description: Task ID
            example: 01234567-89ab-cdef-0123-456789abcdef
          required: true
          description: Task ID
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTask"
      responses:
        "200":
          description: Task updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a task
      description: Delete a task by ID
      parameters:
        - schema:
            type: string
            format: uuid
            description: Task ID
            example: 01234567-89ab-cdef-0123-456789abcdef
          required: true
          description: Task ID
          name: id
          in: path
      responses:
        "200":
          description: Task deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/timers:
    get:
      summary: Get all timers
      description: Retrieve all timers across all tasks
      parameters:
        - schema:
            type: array
            items:
              type: string
              format: uuid
              description: UUID format
              example: 01234567-89ab-cdef-0123-456789abcdef
            description: IDs of the tasks to get timers for
            example:
              - 01234567-89ab-cdef-0123-456789abcdef
              - 01234567-89ab-cdef-0123-456789abcdef
          required: false
          description: IDs of the tasks to get timers for
          name: taskIds
          in: query
      responses:
        "200":
          description: Timers retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimerListResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    post:
      summary: Create a new timer
      description: Start a new timer for a task
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTimer"
      responses:
        "201":
          description: Timer created successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimerResponse"
        "400":
          description: Invalid request data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/tasks/{taskId}/timers:
    get:
      summary: Get timers for a task
      description: Retrieve all timers for a specific task
      parameters:
        - schema:
            type: string
            format: uuid
            description: Task ID for timer operations
            example: 01234567-89ab-cdef-0123-456789abcdef
          required: true
          description: Task ID for timer operations
          name: taskId
          in: path
      responses:
        "200":
          description: Timers retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimerListResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /api/timers/{id}:
    get:
      summary: Get a timer by ID
      description: Retrieve a specific timer by its ID
      parameters:
        - schema:
            type: string
            format: uuid
            description: Timer ID
            example: 01234567-89ab-cdef-0123-456789abcdef
          required: true
          description: Timer ID
          name: id
          in: path
      responses:
        "200":
          description: Timer retrieved successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimerResponse"
        "404":
          description: Timer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    put:
      summary: Update a timer
      description: Update an existing timer (typically to set end time)
      parameters:
        - schema:
            type: string
            format: uuid
            description: Timer ID
            example: 01234567-89ab-cdef-0123-456789abcdef
          required: true
          description: Timer ID
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTimer"
      responses:
        "200":
          description: Timer updated successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimerResponse"
        "404":
          description: Timer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    delete:
      summary: Delete a timer
      description: Delete a timer
      parameters:
        - schema:
            type: string
            format: uuid
            description: Timer ID
            example: 01234567-89ab-cdef-0123-456789abcdef
          required: true
          description: Timer ID
          name: id
          in: path
      responses:
        "200":
          description: Timer deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TimerResponse"
        "404":
          description: Timer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

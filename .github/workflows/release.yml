name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Get pnpm store path
        id: pnpm-store
        shell: bash
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        if: steps.pnpm-store.outputs.path != ''
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Cache Electron downloads
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-v1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode macOS signing assets
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_API_KEY: ${{ secrets.APPLE_CONNECT_API_KEY }}
        run: |
          WORKSPACE_DIR=$(pwd)
          echo "$CSC_LINK" | base64 --decode > "$WORKSPACE_DIR/certificate.p12"
          echo "CSC_LINK=$WORKSPACE_DIR/certificate.p12" >> "$GITHUB_ENV"
          echo "$APPLE_API_KEY" | base64 --decode > "$WORKSPACE_DIR/AuthKey.p8"
          echo "APPLE_API_KEY=$WORKSPACE_DIR/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Setup macOS keychain
        if: matrix.os == 'macos-latest'
        env:
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          KEYCHAIN=build.keychain
          KEYCHAIN_PASSWORD=temp123

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security default-keychain -s "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -t 3600 -u "$KEYCHAIN"

          security import certificate.p12 \
            -k "$KEYCHAIN" \
            -P "$CSC_KEY_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Build Electron app
        run: pnpm --filter electron run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_ISSUER_ID }}
          MAIN_VITE_API_BASE_URL: ${{ vars.MAIN_VITE_API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Notarization history (macOS, on failure/cancel)
        if: (failure() || cancelled()) && matrix.os == 'macos-latest'
        run: |
          xcrun notarytool history \
            --key "$APPLE_API_KEY" \
            --key-id "$APPLE_API_KEY_ID" \
            --issuer "$APPLE_API_ISSUER"
        env:
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_ISSUER_ID }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/electron/dist/*.dmg
            apps/electron/dist/*.zip
            apps/electron/dist/*.exe
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/*.yml
            apps/electron/dist/*.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

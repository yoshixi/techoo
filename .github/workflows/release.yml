name: Release

on:
  push:
    tags:
      - 'v*.*.*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Decode macOS signing assets
        if: matrix.os == 'macos-latest'
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          APPLE_API_KEY: ${{ secrets.APPLE_CONNECT_API_KEY }}
        run: |
          WORKSPACE_DIR=$(pwd)
          echo "$CSC_LINK" | base64 --decode > "$WORKSPACE_DIR/certificate.p12"
          echo "CSC_LINK=$WORKSPACE_DIR/certificate.p12" >> "$GITHUB_ENV"
          echo "$APPLE_API_KEY" | base64 --decode > "$WORKSPACE_DIR/AuthKey.p8"
          echo "APPLE_API_KEY=$WORKSPACE_DIR/AuthKey.p8" >> "$GITHUB_ENV"

      - name: Build Electron app
        run: pnpm --filter electron run build:${{ matrix.platform }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ env.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_CONNECT_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_ISSUER_ID }}
          MAIN_VITE_API_BASE_URL: ${{ vars.MAIN_VITE_API_BASE_URL }}
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}

      - name: Upload artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            apps/electron/dist/*.dmg
            apps/electron/dist/*.zip
            apps/electron/dist/*.exe
            apps/electron/dist/*.AppImage
            apps/electron/dist/*.deb
            apps/electron/dist/*.yml
            apps/electron/dist/*.yaml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zero-Friction Task Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-[#151517] text-slate-100 selection:bg-indigo-500/20 selection:text-slate-100">
    <div class="mx-auto flex min-h-screen w-full max-w-6xl flex-col px-4 py-10">
      <header class="flex flex-col gap-6">
        <div class="flex flex-col gap-6 md:flex-row md:items-center md:justify-between">
          <div class="flex items-center gap-4">
            <span class="flex h-12 w-12 items-center justify-center rounded-full bg-indigo-500 text-lg font-semibold text-white">YM</span>
            <div>
              <div class="flex items-center gap-2">
                <h1 class="text-3xl font-semibold text-white">My tasks</h1>
                <span class="text-lg text-slate-500">▾</span>
              </div>
              <nav class="mt-5 flex gap-6 text-sm text-slate-400">
                <button class="relative pb-3 text-white">
                  List
                  <span class="absolute inset-x-0 bottom-0 h-0.5 rounded-full bg-indigo-400"></span>
                </button>
                <button class="pb-3 transition hover:text-white">Board</button>
                <button class="pb-3 transition hover:text-white">Calendar</button>
                <button class="pb-3 transition hover:text-white">Files</button>
                <button class="pb-3 transition hover:text-white">Note</button>
                <button class="pb-3 transition hover:text-white">+</button>
              </nav>
            </div>
          </div>
          <div class="flex items-center gap-3">
            <button class="rounded-md border border-white/10 px-4 py-2 text-sm text-slate-200 transition hover:border-white/20 hover:text-white">Share</button>
            <button class="rounded-md border border-white/10 px-4 py-2 text-sm text-slate-200 transition hover:border-white/20 hover:text-white">Customize</button>
          </div>
        </div>
      </header>

      <section class="mt-8 flex-1 rounded-xl border border-white/10 bg-[#1b1d21] shadow-xl shadow-black/30">
        <div class="flex flex-col gap-4 border-b border-white/5 px-6 py-5 lg:flex-row lg:items-center lg:justify-between">
          <div class="inline-flex overflow-hidden rounded-md shadow">
            <button class="flex items-center gap-2 bg-indigo-500 px-4 py-2 text-sm font-medium text-white transition hover:bg-indigo-400">
              <span class="text-base">+</span>
              Add task
            </button>
            <button class="flex items-center bg-[#262830] px-3 text-sm text-slate-300 transition hover:text-white">▾</button>
          </div>
          <div class="flex flex-wrap items-center gap-2 text-xs text-slate-300 sm:text-sm">
            <button class="inline-flex items-center gap-2 rounded-full bg-[#262830] px-3 py-1.5 text-slate-200 transition hover:bg-[#2f323c]">
              <span class="text-lg">☰</span>
              Filters: 1 ×
            </button>
            <button class="inline-flex items-center gap-2 rounded-full bg-[#262830] px-3 py-1.5 text-slate-200 transition hover:bg-[#2f323c]">
              <span class="text-lg">⇅</span>
              Sorts: 1 ×
            </button>
            <button class="inline-flex items-center gap-2 rounded-full bg-transparent px-3 py-1.5 text-slate-300 transition hover:bg-[#262830] hover:text-white">
              ▤ Group
            </button>
            <button class="inline-flex items-center gap-2 rounded-full bg-transparent px-3 py-1.5 text-slate-300 transition hover:bg-[#262830] hover:text-white">
              ⤳ Options
            </button>
            <button class="inline-flex items-center justify-center rounded-full bg-transparent p-2 text-slate-300 transition hover:bg-[#262830] hover:text-white" aria-label="Search">
              🔍
            </button>
            <button
              type="button"
              id="stopAllButton"
              class="inline-flex items-center gap-2 rounded-full border border-white/10 px-3 py-1.5 text-slate-200 transition hover:border-white/20 hover:text-white"
            >
              ⏹ Stop all
            </button>
          </div>
        </div>

        <div class="grid grid-cols-[24px_minmax(0,2fr)_minmax(0,1.2fr)_minmax(0,1fr)_auto] border-b border-white/5 px-6 py-3 text-xs font-medium uppercase tracking-wide text-slate-500">
          <span></span>
          <span>Name</span>
          <span class="text-right">Timer</span>
          <span>Status</span>
          <span class="text-right">Actions</span>
        </div>

        <ul id="taskList" class="divide-y divide-white/5"></ul>

        <form
          id="taskForm"
          class="grid grid-cols-[24px_minmax(0,2fr)_minmax(0,1.2fr)_minmax(0,1fr)_auto] items-center gap-3 px-6 py-4 text-sm text-slate-500"
        >
          <span class="text-lg text-slate-600">＋</span>
          <div class="col-span-1">
            <input
              id="taskInput"
              type="text"
              autocomplete="off"
              placeholder="Add task..."
              class="w-full bg-transparent text-sm text-slate-100 placeholder:text-slate-500 focus:outline-none focus:ring-0"
            />
          </div>
          <p class="col-span-1 text-xs text-slate-600">Press Enter to start</p>
          <div class="col-span-1 text-right text-xs text-slate-600">Esc stops timers</div>
          <div></div>
        </form>
      </section>

      <footer class="mt-10 border-t border-white/5 pt-6 text-center text-xs text-slate-500">
        Built for effortless tracking. Need more features? Let me know.
      </footer>
    </div>

    <script>
      const taskInput = document.getElementById('taskInput');
      const taskList = document.getElementById('taskList');
      const stopAllButton = document.getElementById('stopAllButton');
      const taskForm = document.getElementById('taskForm');

      const tasks = [
        { id: 1, name: 'Setup project prompt', isRecording: false, elapsedTime: 3600 },
        { id: 2, name: 'Design wireframes for landing page', isRecording: true, elapsedTime: 1250 },
      ];

      let nextId = tasks.length ? Math.max(...tasks.map((task) => task.id)) + 1 : 1;
      let ticker = null;

      const formatTime = (seconds) => {
        const hrs = Math.floor(seconds / 3600)
          .toString()
          .padStart(2, '0');
        const mins = Math.floor((seconds % 3600) / 60)
          .toString()
          .padStart(2, '0');
        const secs = Math.floor(seconds % 60)
          .toString()
          .padStart(2, '0');
        return `${hrs}:${mins}:${secs}`;
      };

      const focusInput = () => {
        requestAnimationFrame(() => taskInput.focus());
      };

      const stopTicker = () => {
        if (ticker) {
          clearInterval(ticker);
          ticker = null;
        }
      };

      const ensureTicker = () => {
        if (!ticker) {
          ticker = setInterval(() => {
            const nowRecording = tasks.filter((task) => task.isRecording);
            if (!nowRecording.length) {
              stopTicker();
              return;
            }
            nowRecording.forEach((task) => {
              task.elapsedTime += 1;
            });
            render();
          }, 1000);
        }
      };

      const toggleTask = (id) => {
        tasks.forEach((task) => {
          if (task.id === id) {
            task.isRecording = !task.isRecording;
          } else {
            task.isRecording = false;
          }
        });

        if (tasks.some((task) => task.isRecording)) {
          ensureTicker();
        } else {
          stopTicker();
        }

        render();
      };

      const deleteTask = (id) => {
        const index = tasks.findIndex((task) => task.id === id);
        if (index === -1) return;
        tasks.splice(index, 1);
        if (!tasks.some((task) => task.isRecording)) {
          stopTicker();
        }
        render();
      };

      const addTask = (name) => {
        const trimmed = name.trim();
        if (!trimmed) return;

        tasks.forEach((task) => {
          task.isRecording = false;
        });

        tasks.unshift({
          id: nextId++,
          name: trimmed,
          isRecording: true,
          elapsedTime: 0,
        });

        ensureTicker();
        render();
      };

      const stopAll = () => {
        tasks.forEach((task) => {
          task.isRecording = false;
        });
        stopTicker();
        render();
      };

      const render = () => {
        const fragment = document.createDocumentFragment();

        tasks.forEach((task) => {
          const item = document.createElement('li');
          item.className =
            'grid grid-cols-[24px_minmax(0,2fr)_minmax(0,1.2fr)_minmax(0,1fr)_auto] items-center gap-3 px-6 py-3 text-sm transition';
          if (task.isRecording) {
            item.classList.add('bg-[#20222a]');
          } else {
            item.classList.add('hover:bg-[#1f2126]');
          }

          const caret = document.createElement('button');
          caret.type = 'button';
          caret.innerHTML = '&#9662;';
          caret.className = 'flex h-5 w-5 items-center justify-center rounded text-slate-500 hover:text-slate-300';
          caret.setAttribute('aria-label', 'Toggle section');

          const nameCell = document.createElement('div');
          nameCell.className = 'flex flex-col gap-1';

          const title = document.createElement('span');
          title.textContent = task.name;
          title.className = 'text-sm font-medium text-slate-100';

          const subRow = document.createElement('div');
          subRow.className = 'flex items-center gap-2 text-xs uppercase tracking-wide text-slate-500';

          const statusDot = document.createElement('span');
          statusDot.className = `inline-flex h-2 w-2 rounded-full ${task.isRecording ? 'bg-emerald-400' : 'bg-slate-600'}`;

          const statusText = document.createElement('span');
          statusText.textContent = task.isRecording ? 'Recording' : 'Paused';

          subRow.appendChild(statusDot);
          subRow.appendChild(statusText);

          nameCell.appendChild(title);
          nameCell.appendChild(subRow);

          const timerCell = document.createElement('div');
          timerCell.textContent = formatTime(task.elapsedTime);
          timerCell.className = 'text-right font-mono text-sm text-slate-100';

          const statusCell = document.createElement('div');
          statusCell.className = 'text-sm text-slate-400';
          statusCell.textContent = task.isRecording ? 'In progress' : 'Idle';

          const actionsCell = document.createElement('div');
          actionsCell.className = 'flex items-center justify-end gap-2';

          const toggleBtn = document.createElement('button');
          toggleBtn.type = 'button';
          toggleBtn.textContent = task.isRecording ? 'Pause' : 'Record';
          toggleBtn.className = `rounded-md px-4 py-2 text-xs font-medium transition focus:outline-none focus:ring-2 focus:ring-indigo-400/40 ${
            task.isRecording
              ? 'bg-emerald-500 text-slate-950 hover:bg-emerald-400'
              : 'bg-indigo-500 text-white hover:bg-indigo-400'
          }`;
          toggleBtn.addEventListener('click', () => toggleTask(task.id));

          const deleteBtn = document.createElement('button');
          deleteBtn.type = 'button';
          deleteBtn.textContent = 'Clear';
          deleteBtn.className =
            'rounded-md border border-white/10 px-4 py-2 text-xs font-medium text-slate-200 transition hover:border-red-300 hover:text-red-300 focus:outline-none focus:ring-2 focus:ring-red-400/40';
          deleteBtn.addEventListener('click', () => deleteTask(task.id));

          actionsCell.appendChild(toggleBtn);
          actionsCell.appendChild(deleteBtn);

          item.appendChild(caret);
          item.appendChild(nameCell);
          item.appendChild(timerCell);
          item.appendChild(statusCell);
          item.appendChild(actionsCell);

          fragment.appendChild(item);
        });

        taskList.innerHTML = '';
        taskList.appendChild(fragment);
      };

      taskForm.addEventListener('submit', (event) => {
        event.preventDefault();
      });

      taskInput.addEventListener('keydown', (event) => {
        if (event.key === 'Enter') {
          event.preventDefault();
          addTask(taskInput.value);
          taskInput.value = '';
        } else if (event.key === 'Escape') {
          stopAll();
          taskInput.value = '';
        }
      });

      stopAllButton.addEventListener('click', () => {
        stopAll();
        focusInput();
      });

      window.addEventListener('keydown', (event) => {
        if (event.key === '/' && document.activeElement !== taskInput) {
          event.preventDefault();
          focusInput();
        } else if (event.key === 'Escape') {
          stopAll();
        }
      });

      focusInput();
      ensureTicker();
      render();
    </script>
  </body>
</html>
